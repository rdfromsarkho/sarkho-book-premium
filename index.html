<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SarkhoBook Premium</title>
<style>
  body { margin:0; font-family:'Segoe UI', sans-serif; background:#f5f5f5; color:#000; }
  a{text-decoration:none;color:inherit;}
  header{display:flex;align-items:center;justify-content:space-between;padding:15px 20px;background:#00cc6a;color:#fff;}
  header .logo{font-size:22px;font-weight:bold;letter-spacing:1px;}
  header .search input{padding:8px 12px;border-radius:25px;border:none;width:250px;}
  header nav a{margin-left:20px;font-weight:bold;}
  .hero{width:100%;height:250px;background:url('https://via.placeholder.com/1200x250.png?text=SarkhoBook+Premium') center/cover no-repeat;display:flex;align-items:center;justify-content:center;color:#fff;font-size:28px;font-weight:bold;}
  .categories{display:flex;overflow-x:auto;gap:15px;padding:15px 20px;margin-top:15px;}
  .category{flex:0 0 auto;background:#00ff88;color:#000;padding:10px 20px;border-radius:25px;font-weight:bold;cursor:pointer;}
  .container{display:flex;flex-wrap:wrap;gap:20px;padding:20px;justify-content:center;}
  .card{width:180px;background:#fff;border-radius:12px;overflow:hidden;box-shadow:0 4px 10px rgba(0,0,0,0.1);transition:0.3s;text-align:center;}
  .card:hover{transform:translateY(-5px);box-shadow:0 10px 20px rgba(0,204,106,0.3);}
  .card img{width:100%;height:250px;object-fit:cover;}
  .title{font-weight:bold;font-size:16px;margin:10px 0 5px;}
  .price{color:#00cc6a;font-weight:bold;margin-bottom:10px;}
  .locked,.unlocked{padding:10px;border:none;border-radius:20px;width:90%;margin-bottom:10px;font-weight:bold;font-size:14px;}
  .locked{background:#555;color:#fff;cursor:pointer;}
  .unlocked{background:#00ff88;color:#000;cursor:default;}
  footer{background:#00cc6a;color:#fff;padding:20px;text-align:center;margin-top:30px;}
  footer a{color:#000;margin:0 10px;font-weight:bold;}
</style>
</head>
<body>

<header>
  <div class="logo">SarkhoBook</div>
  <input type="text" placeholder="Search PDFs..." onkeyup="searchBook(this.value)">
  <nav>
    <a href="#">Home</a>
    <a href="#">Categories</a>
    <a href="#">Login</a>
    <a href="#">Cart</a>
  </nav>
</header>

<div class="hero">
  Premium eBooks for Everyone
</div>

<div class="categories">
  <div class="category">PDF 1</div>
  <div class="category">PDF 2</div>
  <div class="category">PDF 3</div>
  <div class="category">PDF 4</div>
  <div class="category">PDF 5</div>
</div>

<div class="container" id="bookList"></div>

<footer>
  &copy; 2026 SarkhoBook | 
  <a href="#">About</a> | 
  <a href="#">Contact</a> | 
  <a href="#">Instagram</a> | 
  <a href="#">YouTube</a>
</footer>

<script>
const books = [
  {title:"PDF 1", url:"https://drive.google.com/uc?export=download&id=1gCGNljU414abNxpyxrf7ca-jMLzkHbsH", img:"https://via.placeholder.com/180x250.png?text=Cover+PDF+1"},
  {title:"PDF 2", url:"https://drive.google.com/uc?export=download&id=FILE_ID2", img:"https://via.placeholder.com/180x250.png?text=Cover+PDF+2"},
  {title:"PDF 3", url:"https://drive.google.com/uc?export=download&id=FILE_ID3", img:"https://via.placeholder.com/180x250.png?text=Cover+PDF+3"},
  {title:"PDF 4", url:"https://drive.google.com/uc?export=download&id=FILE_ID4", img:"https://via.placeholder.com/180x250.png?text=Cover+PDF+4"},
  {title:"PDF 5", url:"https://drive.google.com/uc?export=download&id=FILE_ID5", img:"https://via.placeholder.com/180x250.png?text=Cover+PDF+5"}
];

const container = document.getElementById("bookList");

books.forEach(book=>{
  const card = document.createElement("div");
  card.className="card";
  card.innerHTML=`
    <img src="${book.img}">
    <div class="title">${book.title}</div>
    <div class="price">₹49</div>
    <button class="locked" onclick="unlockPDF(this,'${book.url}')">Locked 🔒</button>
  `;
  container.appendChild(card);
});

function unlockPDF(btn,url){
  window.open(url,"_blank");
  btn.innerText="Unlocked ✅";
  btn.classList.remove("locked");
  btn.classList.add("unlocked");
  btn.disabled=true;
}

function searchBook(value){
  value=value.toLowerCase();
  const cards=document.querySelectorAll(".card");
  cards.forEach(card=>{
    const title=card.querySelector(".title").innerText.toLowerCase();
    card.style.display=title.includes(value)?"block":"none";
  });
}
</script>

</body>
</html>
