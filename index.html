<!DOCTYPE html>
<html>
<head>
  <title>Sarkho Book Premium</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body { margin:0; font-family:Arial; background:#0d0d0d; color:#fff; }
    header{ padding:15px; text-align:center; font-size:22px; font-weight:bold; background:#000; border-bottom:1px solid #222; }
    .container{ display:flex; flex-wrap:wrap; gap:15px; padding:20px; justify-content:center; overflow-x:auto; }
    .card{ width:160px; background:#111; border-radius:15px; padding:10px; text-align:center; flex-shrink:0; }
    .card img{ width:100%; border-radius:10px; }
    .title{ font-size:14px; margin-top:8px; }
    .price{ color:#00ff88; font-weight:bold; margin:5px 0; }
    .locked{ background: linear-gradient(45deg,#555,#888); cursor:pointer; padding:8px; border-radius:8px; color:#fff; border:none; width:100%; }
    .unlocked{ background: linear-gradient(45deg,#00ff88,#00cc6a); cursor:default; padding:8px; border-radius:8px; color:#000; border:none; width:100%; }
    .search{ text-align:center; padding:10px; }
    .search input{ padding:10px; border-radius:8px; border:none; outline:none; width:90%; }
  </style>
</head>
<body>

<header>Sarkho Book Premium</header>

<div class="search">
  <input type="text" placeholder="Search books..." onkeyup="searchBook(this.value)">
</div>

<div class="container" id="bookList"></div>

<script>
  // 🔹 Replace these with your Google Drive direct download links
  const books = [
    {title: "Math Notes", url: "https://drive.google.com/uc?export=download&id=1gCGNljU414abNxpyxrf7ca-jMLzkHbsH"},
    {title: "Science Notes", url: "https://drive.google.com/uc?export=download&id=FILE_ID2"},
    {title: "English Notes", url: "https://drive.google.com/uc?export=download&id=FILE_ID3"},
    {title: "History Notes", url: "https://drive.google.com/uc?export=download&id=FILE_ID4"},
    {title: "Geography Notes", url: "https://drive.google.com/uc?export=download&id=FILE_ID5"},
    {title: "Physics Notes", url: "https://drive.google.com/uc?export=download&id=FILE_ID6"},
    {title: "Chemistry Notes", url: "https://drive.google.com/uc?export=download&id=FILE_ID7"},
    {title: "Biology Notes", url: "https://drive.google.com/uc?export=download&id=FILE_ID8"},
    {title: "Computer Notes", url: "https://drive.google.com/uc?export=download&id=FILE_ID9"},
    {title: "English Grammar", url: "https://drive.google.com/uc?export=download&id=FILE_ID10"}
  ];

  const container = document.getElementById("bookList");

  books.forEach(book => {
    const card = document.createElement("div");
    card.className = "card";
    card.innerHTML = `
      <img src="https://via.placeholder.com/200">
      <div class="title">${book.title}</div>
      <div class="price">₹49</div>
      <button class="locked" onclick="unlockPDF(this,'${book.url}')">Locked 🔒</button>
    `;
    container.appendChild(card);
  });

  function unlockPDF(btn, url){
    window.open(url, "_blank"); // PDF open
    btn.innerText = "Unlocked ✅";
    btn.classList.remove("locked");
    btn.classList.add("unlocked");
    btn.disabled = true;
  }

  function searchBook(value){
    value = value.toLowerCase();
    const cards = document.querySelectorAll(".card");
    cards.forEach(card => {
      const title = card.querySelector(".title").innerText.toLowerCase();
      card.style.display = title.includes(value) ? "block" : "none";
    });
  }
</script>

</body>
</html>
