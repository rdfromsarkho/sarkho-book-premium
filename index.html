<!DOCTYPE html>
<html>
<head>
  <title>Sarkho Book Premium</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #000;
      color: #fff;
    }

    h1 {
      text-align: center;
      padding: 20px;
    }

    .container {
      display: flex;
      overflow-x: auto;
      gap: 20px;
      padding: 20px;
    }

    .card {
      min-width: 200px;
      background: #111;
      border-radius: 12px;
      padding: 10px;
      text-align: center;
      box-shadow: 0 0 10px rgba(0,255,0,0.2);
    }

    .card img {
      width: 100%;
      border-radius: 10px;
    }

    .price {
      color: #00ff88;
      font-size: 18px;
      margin: 10px 0;
    }

    button {
      background: #00ff88;
      border: none;
      padding: 8px 15px;
      border-radius: 5px;
      cursor: pointer;
      font-weight: bold;
    }

    button:hover {
      background: #00cc6a;
    }
  </style>
</head>

<body>

<h1>Sarkho Book Premium</h1>

<div class="container">

  <div class="card">
    <img src="https://via.placeholder.com/200">
    <h3>Math Notes</h3>
    <p class="price">₹49</p>
    <button>Buy Now</button>
  </div>

  <div class="card">
    <img src="https://via.placeholder.com/200">
    <h3>Science PDF</h3>
    <p class="price">₹29</p>
    <button>Buy Now</button>
  </div>

  <div class="card">
    <img src="https://via.placeholder.com/200">
    <h3>Reasoning Book</h3>
    <p class="price">₹39</p>
    <button>Buy Now</button>
  </div>

  <div class="card">
    <img src="https://via.placeholder.com/200">
    <h3>GK Notes</h3>
    <p class="price">₹19</p>
    <button>Buy Now</button>
  </div>

</div>

</body>
</html>
