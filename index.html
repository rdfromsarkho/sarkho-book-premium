<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>IQ Puzzle Game</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <h1>🧠 IQ Challenge</h1>
        <div id="game-box">
            <p id="level-text">Level: 1 (Low IQ)</p>
            <h2 id="question">2 + 2 = ?</h2>
            <input type="text" id="answer" placeholder="Apna jawab likho...">
            <button onclick="checkAnswer()">Submit</button>
        </div>

        <div id="leaderboard">
            <h3>🏆 Top Scores</h3>
            <ul id="score-list">
                </ul>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
