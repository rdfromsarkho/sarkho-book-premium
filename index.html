<!DOCTYPE html>
<html>
<head>
  <title>Sarkho Book Premium</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-storage-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

  <style>
    body { margin:0; font-family:Arial; background:#0d0d0d; color:#fff; }
    header{ padding:15px; text-align:center; font-size:22px; font-weight:bold; background:#000; border-bottom:1px solid #222; }
    input, button{ padding:10px; margin:5px 0; border-radius:8px; border:none; outline:none; width:90%; }
    button{ font-weight:bold; }
    .container{ display:flex; flex-wrap:wrap; gap:15px; padding:20px; justify-content:center; overflow-x:auto; }
    .card{ width:160px; background:#111; border-radius:15px; padding:10px; text-align:center; flex-shrink:0; }
    .card img{ width:100%; border-radius:10px; }
    .title{ font-size:14px; margin-top:8px; }
    .price{ color:#00ff88; font-weight:bold; margin:5px 0; }
    .locked{ background: linear-gradient(45deg,#555,#888); cursor:pointer; }
    .unlocked{ background: linear-gradient(45deg,#00ff88,#00cc6a); cursor:default; }
  </style>
</head>
<body>

<header>Sarkho Book Premium</header>

<!-- Admin Login -->
<div id="loginDiv" style="padding:15px;">
  <h2>Admin Login</h2>
  <input type="email" id="email" placeholder="Email"><br>
  <input type="password" id="pass" placeholder="Password"><br>
  <button onclick="login()">Login</button>
  <p id="loginMsg"></p>
</div>

<!-- Admin Upload Section -->
<div id="uploadDiv" style="display:none; padding:15px;">
  <h3>Upload PDF (Admin Only)</h3>
  <input type="file" id="pdfFile"><br>
  <input type="text" id="pdfTitle" placeholder="Book Title"><br>
  <button onclick="uploadPDF()">Upload PDF</button>
  <p id="uploadMsg"></p>
</div>

<!-- Book List -->
<div class="search" style="text-align:center; padding:10px;">
  <input type="text" placeholder="Search books..." onkeyup="searchBook(this.value)">
</div>
<div class="container" id="bookList"></div>

<script>
  // Firebase config
  const firebaseConfig = {
    apiKey: "YOUR_API_KEY",
    authDomain: "YOUR_PROJECT.firebaseapp.com",
    projectId: "YOUR_PROJECT",
    storageBucket: "YOUR_PROJECT.appspot.com",
    messagingSenderId: "SENDER_ID",
    appId: "APP_ID",
    databaseURL: "https://YOUR_PROJECT.firebaseio.com"
  };
  firebase.initializeApp(firebaseConfig);

  const auth = firebase.auth();
  const db = firebase.database();
  const storage = firebase.storage();
  const adminEmail = "admin@example.com";

  // Admin login
  function login() {
    const email = document.getElementById("email").value;
    const pass = document.getElementById("pass").value;
    auth.signInWithEmailAndPassword(email, pass)
      .then(()=>{
        if(auth.currentUser.email === adminEmail){
          document.getElementById("uploadDiv").style.display = "block";
          document.getElementById("loginDiv").style.display = "none";
        } else {
          alert("Not authorized");
          auth.signOut();
        }
      })
      .catch(err=>{
        document.getElementById("loginMsg").innerText = err.message;
      });
  }

  // Admin upload PDF
  function uploadPDF() {
    const file = document.getElementById("pdfFile").files[0];
    const title = document.getElementById("pdfTitle").value;
    if(!file || !title){ alert("Select file & enter title"); return; }

    const storageRef = storage.ref("pdfs/"+file.name);
    storageRef.put(file).then(()=>{
      storageRef.getDownloadURL().then(url=>{
        db.ref("books").push({title:title, url:url});
        document.getElementById("uploadMsg").innerText = "Uploaded ✅";
        loadBooks();
      });
    });
  }

  // Load all books
  function loadBooks() {
    const container = document.getElementById("bookList");
    container.innerHTML = "";
    db.ref("books").once("value").then(snapshot=>{
      snapshot.forEach(child=>{
        const book = child.val();
        const card = document.createElement("div");
        card.className = "card";
        card.innerHTML = `<img src="https://via.placeholder.com/200">
                          <div class="title">${book.title}</div>
                          <div class="price">₹49</div>
                          <button class="locked" onclick="unlockPDF(this,'${book.url}')">Locked 🔒</button>`;
        container.appendChild(card);
      });
    });
  }

  // Unlock PDF (free)
  function unlockPDF(btn, url) {
    window.open(url,'_blank');
    btn.innerText = "Unlocked ✅";
    btn.classList.remove("locked");
    btn.classList.add("unlocked");
    btn.disabled = true;
  }

  // Search
  function searchBook(value) {
    const cards = document.querySelectorAll(".card");
    value = value.toLowerCase();
    cards.forEach(card=>{
      const title = card.querySelector(".title").innerText.toLowerCase();
      card.style.display = title.includes(value) ? "block" : "none";
    });
  }

  loadBooks();
</script>

</body>
</html>
